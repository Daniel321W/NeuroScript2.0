{% extends "base.html" %}

{% block content %}
<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-primary fw-bold">Lista pacjentów</h2>
        <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary btn-sm">← Powrót do pulpitu</a>
    </div>

    <div class="row mb-3">
        <div class="col-md-5">
            <form action="#" method="get" class="d-flex">
                <input type="text" name="search" class="form-control me-2" placeholder="Szukaj po ID lub roku urodzenia..." value="{{ request.GET.search }}">
                <button type="submit" class="btn btn-outline-primary shadow-sm">
                    <i class="bi bi-search"></i>
                </button>
            </form>
        </div>
    </div>

    <div class="card shadow-sm border-0">
        <div class="card-body p-0">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-light">
                    <tr>
                        <th class="ps-4">ID</th>
                        <th>Płeć</th>
                        <th>Rok urodzenia</th>
                        <th class="text-end pe-4">Akcje</th>
                    </tr>
                </thead>
                <tbody>
                    {% for patient in patients %}
                        <tr>
                            <td class="ps-4 fw-bold text-muted">{{ patient.identyfikator_pacjenta }}</td>
                            <td>{{ patient.plec }}</td>
                            <td>{{ patient.rok_urodzenia }}</td>
                            <td class="text-end pe-4">
                                <div class="btn-group shadow-sm" role="group">
                                    <a href="#" class="btn btn-sm btn-info text-white" title="Podgląd"><i class="bi bi-eye"></i></a>
                                    <a href="#" class="btn btn-sm btn-warning text-white" title="Edytuj"><i class="bi bi-pencil"></i></a>
                                    <a href="#" class="btn btn-sm btn-danger text-white" title="Usuń"><i class="bi bi-trash"></i></a>
                                </div>
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
