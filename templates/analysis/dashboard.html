{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-12">
            <div class="p-5 mb-4 bg-light rounded-3 border">
                <div class="container-fluid py-5">
                    <h1 class="display-5 fw-bold text-primary">Witaj, <strong>{{ username }}</strong></h1>
                    <hr class="my-4">
                    <p>Tutaj się zrobi coś.</p>
                    <form action="{% url 'logout' %}" method="post" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-outline-danger shadow-sm">
                        Wyloguj się
                    </button>
                </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
