{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-4">
        <div class="card shadow border-0">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Logowanie</h2>
                <p class="text-muted text-center small">Panel dla personelu medycznego</p>
                
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Użytkownik</label>
                        <input type="text" name="username" class="form-control" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Hasło</label>
                        <input type="password" name="password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2">Zaloguj się</button>
                </form>
                
                {% if form.errors %}
                    <div class="alert alert-danger mt-3 small">
                        Błędny użytkownik lub hasło.
                    </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
